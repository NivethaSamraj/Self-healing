version: "0.1"
globalTimeout: 150
testSuiteTimeout: 150
testSuiteStep: 150
runson: win
autosplit: true
retryOnFailure: true
maxRetries: 2
concurrency: 10
pre:
  - npm install
  - npx playwright install
cacheKey: '{{ checksum "package-lock.json" }}'
cacheDirectories:
  - node_modules
testDiscovery:
  type: raw
  mode: dynamic
  command: cat hyperexecutetestsegregation.txt
testRunnerCommand: npx playwright test pc_test_scripts --config=./hypertest.config.js -g '$test'
tunnel: true
mergeArtifacts: true
report: true
partialReports:
  frameworkName: allure-native
  location: allure-results
  type: html
jobLabel: ["Guidewire", "Playwright_JS", "pc_Consolidated"]
uploadArtefacts:
 - name: AllureResults
   path:
    - allure-results/**
    